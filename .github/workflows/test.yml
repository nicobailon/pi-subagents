name: CI

on:
  push:
    branches: [main]
    paths: ["src/**", "test/**", ".github/workflows/**"]
  pull_request:
    branches: [main]
    paths: ["src/**", "test/**", ".github/workflows/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Unit tests
        run: npm test
